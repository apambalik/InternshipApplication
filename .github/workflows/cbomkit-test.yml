name: Test CBOMkit on InternshipApplication

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  cbom-scan:
    runs-on: ubuntu-latest
    name: Generate CBOM for Java source

    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Show Java files being scanned
        run: |
          echo "Java files in repository:"
          find . -name "*.java" -print

      - name: Show crypto sample content
        run: |
          echo "Checking for CryptoSample.java:"
          find . -name "CryptoSample.java" -print
          grep -R "MessageDigest\|KeyGenerator\|Cipher\|Signature\|KeyPairGenerator" . --include="*.java" || true

      - name: Create CBOM
        uses: cbomkit/cbomkit-action@v2.2.0
        id: cbom
        env:
          CBOMKIT_LANGUAGES: java
          CBOMKIT_OUTPUT_DIR: cbom
          CBOMKIT_JAVA_REQUIRE_BUILD: false
          CBOMKIT_WRITE_EMTPY_CBOMS: true

      - name: List generated CBOM files
        run: |
          echo "CBOM output pattern: ${{ steps.cbom.outputs.pattern }}"
          find cbom -type f -print || true
          echo "Preview cbom.json:"
          cat cbom/cbom.json || true

      - name: Upload CBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: CBOM
          path: ${{ steps.cbom.outputs.pattern }}
          if-no-files-found: warn